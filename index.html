<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login - TRADSUL FINANCE" />
  <title>TRADSUL FINANCE | Login</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              900: '#0f172a',
              800: '#1e3a5f',
              700: '#1d4ed8',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Custom CSS (optional if relying entirely on Tailwind) -->
  <link rel="stylesheet" href="style/style.css" />
</head>
<body class="bg-slate-100 min-h-screen font-sans flex items-center justify-center">

  <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-slate-200">
    
    <!-- Logo & Branding -->
    <div class="flex flex-col items-center justify-center mb-8 gap-3">
      <div class="flex items-center justify-center w-14 h-14 bg-blue-700 rounded-xl shadow-lg shadow-blue-700/30">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 14L14 6L22 14L14 22L6 14Z" fill="white" fill-opacity="0.9"/>
          <path d="M10 14L14 10L18 14L14 18L10 14Z" fill="#1d4ed8"/>
        </svg>
      </div>
      <div class="text-center">
        <h1 class="text-2xl font-bold tracking-wide text-slate-800">
          TRADSUL <span class="text-blue-700">FINANCE</span>
        </h1>
        <p class="text-sm text-slate-500 mt-1">Acesso ao Painel de Gestão</p>
      </div>
    </div>

    <!-- Error Message Container -->
    <div id="error-message" class="hidden mb-6 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg font-medium text-center">
      <!-- Error text will be injected here -->
    </div>

    <!-- Login Form -->
    <form id="login-form" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">E-mail corporativo</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
          </div>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-shadow text-sm"
            placeholder="usuario@tradsul.com.br"
          />
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
          <input 
            type="password" 
            id="password" 
            name="password" 
            required 
            class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-shadow text-sm"
            placeholder="••••••••"
          />
        </div>
      </div>

      <button 
        type="submit" 
        id="submit-btn"
        class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 transition-colors"
      >
        Sign In
      </button>
    </form>
    
    <div class="mt-8 text-center">
      <p class="text-xs text-slate-400">
        Ambiente Seguro • TRADSUL Finance
      </p>
    </div>

  </div>

  <!-- Login Logic -->
  <script src="./script/login.js" defer></script>
</body>
</html>
